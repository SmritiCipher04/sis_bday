<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Birthday Cake 🎂</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }

      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="birthdayText"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
  // Read URL params
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name") || "Bunu";
  let candleCount = parseInt(params.get("candles")) || 4;
  candleCount = Math.min(Math.max(candleCount, 1), 30);

  const birthdayText = document.getElementById("birthdayText");
  birthdayText.innerHTML = `
    <div id="mainTitle">Happy Birthday, ${name}! 🎂</div>
    <div id="subTitle">Tap the button below and then blow on your microphone.</div>
  `;

  const cake = document.getElementById("cake");

  const colors = [
    "green-candle",
    "purple-candle",
    "blue-candle",
    "yellow-candle",
  ];

  const CAKE_VISUAL_WIDTH = 35;

  function createCandles(count) {
    cake.innerHTML = "";

    const CANDLE_VISUAL_WIDTH = 2;
    const availableWidth = CAKE_VISUAL_WIDTH;
    const candlesPerRow = 6;
    const rowCount = Math.ceil(count / candlesPerRow);
    const shiftAmount = 4;

    for (let i = 0; i < count; i++) {
      const candle = document.createElement("div");
      candle.classList.add("candle");

      const colorClass =
        colors[Math.floor(Math.random() * colors.length)];
      candle.classList.add(colorClass);

      const row = Math.floor(i / candlesPerRow);
      const col = i % candlesPerRow;

      const totalCandlesInRow = Math.min(
        candlesPerRow,
        count - row * candlesPerRow
      );

      const rowSpacing =
        availableWidth / (totalCandlesInRow + 1);

      const leftBase =
        rowSpacing * (col + 1) -
        CANDLE_VISUAL_WIDTH / 2 +
        5;

      const rowShift =
        row % 2 === 0 ? 0 : shiftAmount;

      candle.style.position = "absolute";
      candle.style.top = `${10 + row * 3}px`;
      candle.style.left = `${leftBase - rowShift + 4}px`;

      cake.appendChild(candle);
    }
  }

  createCandles(candleCount);

  function blowOutCandles() {
    const candles = document.querySelectorAll(".candle");

    candles.forEach((candle) => {
      const delay = Math.random() * 1000;

      setTimeout(() => {
        colors.forEach((color) => {
          if (candle.classList.contains(color)) {
            candle.classList.add("blown");
          }
        });
      }, delay);
    });

    setTimeout(() => {
      document.getElementById("subTitle").innerHTML =
        `Yayy! 🎉<br><br>
        Wishing you the happiest birthday ever!! 💗<br><br>
        Love you so much baby sister ❤️<br><br>
        Always remember I will be there by your side forever.<br><br>
        Even if the whole world turns against you, I'll always stand with you.<br><br>
        I know I can't afford much right now, but once I start earning, you'll be the first person I spoil. 💕<br><br>
        LOVE YOUUUU!! 😘`;
    }, 1500);
  }

  // -----------------------
  // Start Button
  // -----------------------

  const btn = document.createElement("button");
  btn.innerText = "🎤 Tap to Start";
  btn.style.padding = "12px 22px";
  btn.style.fontSize = "18px";
  btn.style.marginTop = "20px";
  btn.style.cursor = "pointer";
  btn.style.borderRadius = "12px";

  document.querySelector(".container").appendChild(btn);

  let blown = false;

  btn.addEventListener("click", async () => {
    btn.innerText = "Listening... 🌬️";

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
      });

      const audioContext = new (window.AudioContext ||
        window.webkitAudioContext)();

      await audioContext.resume();

      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;

      const microphone =
        audioContext.createMediaStreamSource(stream);

      microphone.connect(analyser);

      const dataArray = new Uint8Array(analyser.fftSize);

      let consecutive = 0;

      function detectBlow() {
        analyser.getByteTimeDomainData(dataArray);

        let sum = 0;

        for (let i = 0; i < dataArray.length; i++) {
          const value = (dataArray[i] - 128) / 128;
          sum += value * value;
        }

        const volume =
          Math.sqrt(sum / dataArray.length);

        console.log(volume);

        if (volume > 0.09) {
          consecutive++;
        } else {
          consecutive = 0;
        }

        if (consecutive > 8 && !blown) {
          blown = true;

          btn.style.display = "none";

          blowOutCandles();
          return;
        }

        requestAnimationFrame(detectBlow);
      }

      detectBlow();
    } catch (err) {
      console.error(err);

      alert(
        "Microphone permission is required for blowing out the candles."
      );
    }
  });
</script>
